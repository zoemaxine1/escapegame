    #hud-label { font-family:var(--font-fun); font-size:13px; color:#fff; text-shadow:2px 2px 0 var(--hot-pink); margin-bottom:5px; }

    #step-indicator { position:fixed; top:18px; right:22px; z-index:10; pointer-events:none; }

    #prompt { position:fixed; bottom:28px; left:50%; transform:translateX(-50%); z-index:10; pointer-events:none; text-align:center; opacity:0; transition:opacity 0.3s ease; }

    #prompt-key { display:inline-block; font-family:var(--font-fun); font-size:13px; color:#fff; background:var(--hot-pink); padding:4px 14px; border-radius:99px; border:3px solid rgba(255,255,255,0.7); box-shadow:0 4px 0 #a02060,0 6px 16px rgba(232,69,138,0.5); margin-bottom:5px; }

    #scene-overlay { position:fixed; inset:0; z-index:50; opacity:0; pointer-events:none; transition:opacity 0.5s ease; overflow:hidden; }
    #scene-overlay.active { opacity:1; pointer-events:all; }
    #scene-bg-svg { position:absolute; inset:0; width:100%; height:100%; }
    #scene-video-wrap { position:absolute; overflow:hidden; background:#000; box-shadow:0 0 0 3px #111,0 12px 40px rgba(0,0,0,0.7); }

    #scene-vignette { position:absolute; inset:0; background:radial-gradient(ellipse at center,transparent 32%,rgba(0,0,0,0.5) 100%); pointer-events:none; z-index:3; }
    #scene-fallback { display:none; position:absolute; inset:0; z-index:5; align-items:center; justify-content:center; flex-direction:column; gap:8px; background:#111; }

    #scene-fallback p { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.4); }
    #scene-caption { position:absolute; bottom:40px; left:50%; transform:translateX(-50%); z-index:10; text-align:center; pointer-events:none; max-width:min(700px,84vw); }

    #bar-social { background:linear-gradient(90deg,#4facfe,#00f2fe); }
    #bar-attitude { background:linear-gradient(90deg,#43e97b,#38f9d7); }

    #ending-attention { font-family:var(--font-mono); font-size:10px; letter-spacing:2px; color:rgba(100,50,30,0.6); margin-bottom:40px; }

/* ═══════════════════════════════════════
   SCENE UI CONTROLLER
   ═══════════════════════════════════════ */
const SceneUI = {
  _overlay:null, _svgEl:null, _videoWrap:null, _videoEl:null, _fallback:null, _caption:null,
  init() {
    this._overlay   = document.getElementById('scene-overlay');
    this._svgEl     = document.getElementById('scene-bg-svg');
    this._videoWrap = document.getElementById('scene-video-wrap');
    this._videoEl   = document.getElementById('scene-video');
    this._fallback  = document.getElementById('scene-fallback');
    this._caption   = document.getElementById('scene-caption-text');
  },
  show(id, videoSrc) {
    const scene = SCENES[id];
    if (!scene) return;
    const { svgInner, videoRect } = scene.build();
    this._svgEl.innerHTML = svgInner;
    this._overlay.classList.add('active');
    requestAnimationFrame(() => {
      const vw = window.innerWidth, vh = window.innerHeight;
      const svgA = 1440/900, vpA = vw/vh;
      let sx, sy, ox=0, oy=0;
      if (vpA > svgA) { sx=sy=vw/1440; oy=(vh-900*sy)/2; }
      else            { sx=sy=vh/900;  ox=(vw-1440*sx)/2; }
      this._videoWrap.style.left   = (videoRect.xPct*1440*sx+ox)+'px';
      this._videoWrap.style.top    = (videoRect.yPct*900 *sy+oy)+'px';
      this._videoWrap.style.width  = (videoRect.wPct*1440*sx)+'px';
      this._videoWrap.style.height = (videoRect.hPct*900 *sy)+'px';
      this._videoWrap.style.borderRadius = '5px';
      this._caption.textContent = scene.caption;
      this._fallback.classList.remove('show');
      this._videoEl.src = videoSrc;
      this._videoEl.currentTime = 0;
      const p = this._videoEl.play();
      if (p) p.catch(() => this._fallback.classList.add('show'));
    });
  },
  hide() {
    this._overlay.classList.remove('active');
    this._videoEl.pause();
    this._videoEl.src = '';
    this._fallback.classList.remove('show');
  }
};

    this._player = this.add.dom(this._px, this._py, 'img');
    this._player.node.src = 'assets/player.gif';
    this._player.node.style.width = '36px';
    this._player.node.style.height = '36px';
    this._player.setOrigin(0.5);
    this._arrowGfx = this.add.graphics();
    this._cursors = this.input.keyboard.createCursorKeys();
    this._wasd = {
      up:   this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.W),
      down: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.S),
      left: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.A),
      right:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.D),
    };
    this._eKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.E);
    this._eKey.on('down', () => this._onE());
    SceneUI.init(); this._updateHUD(); this._updateStep();
  }
  update(_, dt) {
    if (this._done) return;
    if (!this._busy) { this._move(dt); this._checkNear(); this._drawArrow(); }
    else {
      const s = INTERACTIONS[this._step]; if (!s) return;
      s.time += dt/1000;
      Object.entries(s.fx).forEach(([t,v]) => {
        let inc = v*(dt/1000);
        if (s.max !== undefined) inc = Math.min(inc, s.max-(TRAITS[t]||0));
        TRAITS[t] = Phaser.Math.Clamp((TRAITS[t]||0)+inc, 0, 100);
      });
      if (s.drain) TRAITS.attention = Phaser.Math.Clamp(TRAITS.attention-VINE_DRAIN*dt/1000, 0, 100);
      this._updateHUD();
    }
  }
  _buildRoom() {
    const g = this.add.graphics();
    g.fillStyle(C.floor); g.fillRect(0,0,WORLD_W,WORLD_H);
    g.lineStyle(0.5,C.floorLine,0.3);
    for(let x=0;x<=WORLD_W;x+=40) g.lineBetween(x,0,x,WORLD_H);
    for(let y=0;y<=WORLD_H;y+=40) g.lineBetween(0,y,WORLD_W,y);
    g.fillStyle(C.wall); g.fillRect(0,0,WORLD_W,34); g.fillRect(0,0,28,WORLD_H);
    g.lineStyle(1.5,C.wallEdge,0.6); g.lineBetween(0,34,WORLD_W,34); g.lineBetween(28,0,28,WORLD_H);
    this._window(g,118,0,122,34); this._window(g,498,0,122,34);
    g.fillStyle(C.rug,0.6); g.fillRoundedRect(468,292,272,182,6);
    g.lineStyle(2,C.rugEdge,0.5); g.strokeRoundedRect(474,298,260,170,5);
    g.fillStyle(0xff8c2a,0.3); g.fillRoundedRect(28,380,202,122,5);
  }
  _window(g,x,y,w,h) {
    g.fillStyle(C.winGlass,0.8); g.fillRect(x+3,y,w-6,h-2);
    g.fillStyle(C.winFrame); g.fillRect(x,y,w,4); g.fillRect(x,y,4,h); g.fillRect(x+w-4,y,4,h);
    g.fillStyle(C.winGlass,0.5); g.fillRect(x+4,y+4,(w-12)/2,h-6); g.fillRect(x+(w-12)/2+8,y+4,(w-12)/2,h-6);
    g.fillStyle(C.winFrame); g.fillRect(x+w/2-1,y+3,2,h-5);
  }
  _buildFurniture() {
    this._desk(44,36,182,74); this._monitor(72,40,102,60,C.screen1);
    const k1=this.add.graphics(); k1.fillStyle(C.keyboard); k1.fillRoundedRect(64,106,94,14,2);
    this._chair(132,128); this._bookshelf(28,158,50,162); this._plant(468,46);
    this._couch(478,304);
    const st=this.add.graphics(); st.fillStyle(C.desk); st.fillRoundedRect(690,320,44,44,4);
    st.fillStyle(0xffd430,0.9); st.fillTriangle(698,316,714,316,706,304); st.fillStyle(0xe8c020); st.fillRect(704,306,4,12);
    this._desk(28,372,222,74); this._monitor(66,376,122,66,C.screen2);
    const k2=this.add.graphics(); k2.fillStyle(C.keyboard); k2.fillRoundedRect(56,448,106,14,2);
    this._chair(124,464); this._tvUnit(524,32); this._plant(734,472);
  }
  _desk(x,y,w,h) {
    const g=this.add.graphics(); g.fillStyle(C.deskTop); g.fillRoundedRect(x,y,w,h,4);
    g.fillStyle(C.desk); g.fillRect(x,y+h-6,w,6);
    g.fillStyle(0x8b4513); g.fillRect(x+8,y+h,8,12); g.fillRect(x+w-16,y+h,8,12);
  }
  _monitor(x,y,w,h,sc) {
    const g=this.add.graphics(); g.fillStyle(C.monitor); g.fillRoundedRect(x,y,w,h,4);
    g.fillStyle(sc); g.fillRoundedRect(x+5,y+5,w-10,h-14,2);
    g.fillStyle(C.monitor); g.fillRect(x+w/2-4,y+h,8,8); g.fillRect(x+w/2-12,y+h+8,24,4);
  }
  _chair(cx,y) {
    const g=this.add.graphics(); g.fillStyle(C.chair); g.fillRoundedRect(cx-14,y-24,28,24,4);
    g.fillStyle(C.chairSeat); g.fillRoundedRect(cx-20,y,40,14,5);
    g.fillStyle(C.chair); g.fillRect(cx-24,y-2,6,18); g.fillRect(cx+18,y-2,6,18);
  }
  _couch(x,y) {
    const g=this.add.graphics(); const w=212,h=82;
    g.fillStyle(C.couchBack); g.fillRoundedRect(x,y,w,24,5);
    g.fillStyle(C.couchSeat); g.fillRoundedRect(x,y+22,w,h-22,5);
    g.fillStyle(C.couch); g.fillRoundedRect(x-14,y,16,h,5); g.fillRoundedRect(x+w-2,y,16,h,5);
    g.fillStyle(C.cushion); g.fillRoundedRect(x+10,y+24,84,h-30,4); g.fillRoundedRect(x+102,y+24,84,h-30,4);
    g.lineStyle(1.5,C.couchBack,0.5); g.lineBetween(x+98,y+24,x+98,y+h);
    g.fillStyle(0xff8c2a); g.fillRoundedRect(x+14,y+4,32,16,4);
    g.fillStyle(0xe8458a); g.fillRoundedRect(x+84,y+4,32,16,4);
    g.fillStyle(0x9b59f5); g.fillRoundedRect(x+152,y+4,32,16,4);
  }
  _tvUnit(x,y) {
    const g=this.add.graphics(); g.fillStyle(C.tvStand); g.fillRoundedRect(x-30,y+102,272,56,4);
    g.fillStyle(0xa06028); g.fillRect(x-30,y+102,272,8);
    g.fillStyle(C.tv); g.fillRoundedRect(x,y,212,106,8);
    g.fillStyle(C.tvScreen); g.fillRoundedRect(x+10,y+8,180,84,4);
    g.fillStyle(0xe84060); g.fillCircle(x+200,y+54,6); g.fillStyle(0xc8c0b0); g.fillCircle(x+200,y+70,4);
  }
  _plant(x,y) {
    const g=this.add.graphics(); g.fillStyle(C.pot); g.fillRoundedRect(x-10,y+18,20,15,3);
    g.fillStyle(C.plant); g.fillRect(x-1,y+8,2,12);
    g.fillStyle(C.plant,0.92); g.fillEllipse(x,y,22,26);
    g.fillStyle(C.plant,0.62); g.fillEllipse(x-10,y+4,16,20);
    g.fillStyle(C.plant,0.72); g.fillEllipse(x+10,y+4,16,20);
  }
  _bookshelf(x,y,w,h) {
    const g=this.add.graphics(); g.fillStyle(C.shelf); g.fillRect(x,y,w,h);
    const rows=4,rh=h/rows;
    for(let i=1;i<rows;i++){g.fillStyle(C.desk);g.fillRect(x,y+i*rh-2,w,3);}
    for(let s=0;s<rows;s++){let bx=x+3; for(let b=0;b<5;b++){const bw=6+(b%2)*2; if(bx+bw>x+w-3)break; g.fillStyle(C.book[b%C.book.length]); g.fillRect(bx,y+s*rh+5,bw,rh-9); bx+=bw+1;}}
  }
  _defineHotspots() {
    this._spots=[
      {id:'vine',    x:592, y:366},
      {id:'penguin', x:158, y:456},
      {id:'tv',      x:636, y:130},
      {id:'youtube', x:144, y:116},
    ];
  }
  _move(dt) {
    const s=MOVE_SPEED*dt/1000; let dx=0,dy=0;
    if(this._cursors.left.isDown  ||this._wasd.left.isDown)  dx-=1;
    if(this._cursors.right.isDown ||this._wasd.right.isDown) dx+=1;
    if(this._cursors.up.isDown    ||this._wasd.up.isDown)    dy-=1;
    if(this._cursors.down.isDown  ||this._wasd.down.isDown)  dy+=1;
    if(dx&&dy){dx*=0.707;dy*=0.707;}
    this._px=Phaser.Math.Clamp(this._px+dx*s,32,WORLD_W-14);
    this._py=Phaser.Math.Clamp(this._py+dy*s,36,WORLD_H-14);
    this._player.setPosition(this._px,this._py);
  }
  _checkNear() {
    if(this._step>=this._spots.length) return;
    const spot=this._spots[this._step];
    const d=Phaser.Math.Distance.Between(this._px,this._py,spot.x,spot.y);
    if(d<INTERACT_DIST){
      if(this._near!==spot.id){
        this._near=spot.id;
        document.getElementById('prompt-text').textContent=INTERACTIONS[this._step].label;
        document.getElementById('prompt').classList.add('visible');
      }
    } else if(this._near){this._near=null;document.getElementById('prompt').classList.remove('visible');}
  }
  _drawArrow() {
    const g=this._arrowGfx; g.clear();
    if(this._step>=this._spots.length||this._done) return;
    const spot=this._spots[this._step];
    const d=Phaser.Math.Distance.Between(this._px,this._py,spot.x,spot.y);
    if(d<70) return;
    const ang=Math.atan2(spot.y-this._py,spot.x-this._px);
    const ax=this._px+Math.cos(ang)*28,ay=this._py+Math.sin(ang)*28;
    const hl=8,ha=0.4;
    g.lineStyle(2,C.arrow,0.72); g.beginPath();
    g.moveTo(ax,ay); g.lineTo(ax-hl*Math.cos(ang-ha),ay-hl*Math.sin(ang-ha));
    g.moveTo(ax,ay); g.lineTo(ax-hl*Math.cos(ang+ha),ay-hl*Math.sin(ang+ha));
    g.strokePath();
    g.fillStyle(C.arrow,0.4); g.fillCircle(this._px+Math.cos(ang)*14,this._py+Math.sin(ang)*14,3);
  }
  _onE() {
    if(this._done) return;
    if(this._busy){this._exit();return;}
    if(this._near){const spot=this._spots[this._step]; if(spot&&spot.id===this._near)this._enter();}
  }
  _enter() {
    this._busy=true;
    document.getElementById('prompt').classList.remove('visible');
    this._arrowGfx.clear();
    const s=INTERACTIONS[this._step]; if(!s) return;
    s.time=0; SceneUI.show(s.id,s.video);
  }
  _exit() {
    this._busy=false; SceneUI.hide(); this._near=null;
    this._step++; this._updateHUD(); this._updateStep();
    if(this._step>=INTERACTIONS.length){
      this._done=true;
      document.getElementById('prompt').classList.remove('visible');
      this._arrowGfx.clear();
      setTimeout(()=>this._showEnding(),700);
    }
  }
  _updateHUD() { document.getElementById('attention-fill').style.width=Math.max(0,Math.min(100,TRAITS.attention))+'%'; }
  _updateStep() { const l=document.getElementById('step-label'); l.textContent=this._step<INTERACTIONS.length?INTERACTIONS[this._step].step:''; }
  _showEnding() {
    document.getElementById('ending').classList.add('active');
    [{bar:'bar-aggression',val:'val-aggression',key:'aggression'},{bar:'bar-creativity',val:'val-creativity',key:'creativity'},{bar:'bar-social',val:'val-social',key:'social'},{bar:'bar-attitude',val:'val-attitude',key:'attitude'}].forEach((r,i)=>{
      setTimeout(()=>{const v=Math.round(TRAITS[r.key]); document.getElementById(r.bar).style.width=v+'%'; document.getElementById(r.val).textContent=v;},350+i*220);
    });
    document.getElementById('ending-attention').textContent='Attention remaining — '+Math.round(TRAITS.attention);
    setTimeout(()=>document.getElementById('ending-line').classList.add('show'),2400);
  }
}

new Phaser.Game({ type:Phaser.AUTO, width:WORLD_W, height:WORLD_H, parent:'game-container', scene:Room, dom:{createContainer:true} });
</script>
